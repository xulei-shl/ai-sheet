<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 112" role="img" aria-labelledby="ai-sheet-dark-logo-title ai-sheet-dark-logo-desc">
  <title id="ai-sheet-dark-logo-title">AI Sheet Dark Logo</title>
  <desc id="ai-sheet-dark-logo-desc">AI Sheet logo optimized for dark Wilderness theme backgrounds.</desc>

  <defs>
    <linearGradient id="dark-symbol-bg" x1="16" y1="14" x2="98" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#465057"/>
      <stop offset="1" stop-color="#232a2e"/>
    </linearGradient>

    <linearGradient id="dark-symbol-accent" x1="34" y1="26" x2="88" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ece4d0"/>
      <stop offset="0.48" stop-color="#9db56d"/>
      <stop offset="1" stop-color="#3f50a3"/>
    </linearGradient>

    <filter id="dark-soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#afd662" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g id="dark-logo-symbol" filter="url(#dark-soft-shadow)">
    <rect x="16" y="14" width="82" height="82" rx="22" fill="url(#dark-symbol-bg)"/>
    <path d="M76 14h4c9.94 0 18 8.06 18 18v4L76 14Z" fill="#54636d" opacity="0.86"/>
    <path d="M76 14v19c0 2.21 1.79 4 4 4h18" fill="none" stroke="#9ca6ac" stroke-opacity="0.48" stroke-width="2"/>

    <rect x="30" y="33" width="54" height="42" rx="8" fill="#2d353b" opacity="0.9"/>
    <path d="M30 47h54M30 61h54M48 33v42M66 33v42" stroke="#dfd6bf" stroke-opacity="0.24" stroke-width="2"/>

    <path d="M39 68C48 51 56 57 62 45C68 33 76 37 81 28" fill="none" stroke="url(#dark-symbol-accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="39" cy="68" r="4" fill="#ece4d0"/>
    <circle cx="62" cy="45" r="4" fill="#9db56d"/>
    <circle cx="81" cy="28" r="4" fill="#3f50a3"/>

    <path d="M82 55l3.2 7.2L92 65.5l-6.8 3.1L82 76l-3.2-7.4L72 65.5l6.8-3.3L82 55Z" fill="#9db56d"/>
    <path d="M42 24l1.9 4.1L48 30l-4.1 1.9L42 36l-1.9-4.1L36 30l4.1-1.9L42 24Z" fill="#ece4d0"/>
  </g>

  <g id="dark-wordmark">
    <!-- 同样将 y="58" 修改为了 y="69" -->
    <text x="124" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="760" letter-spacing="-1.4" fill="#ece4d0">
      AI
    </text>
    <text x="175" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="680" letter-spacing="-1.2" fill="#dfd6bf">
      Sheet
    </text>
  </g>
</svg>