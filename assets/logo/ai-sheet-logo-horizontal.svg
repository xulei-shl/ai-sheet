<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 112" role="img" aria-labelledby="ai-sheet-logo-title ai-sheet-logo-desc">
  <title id="ai-sheet-logo-title">AI Sheet Logo</title>
  <desc id="ai-sheet-logo-desc">A rounded spreadsheet icon with an AI sparkle and the AI Sheet wordmark, using indigo and olive green theme colors.</desc>

  <defs>
    <linearGradient id="sheet-bg" x1="18" y1="14" x2="96" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dddbc7"/>
      <stop offset="1" stop-color="#ceceb4"/>
    </linearGradient>

    <linearGradient id="ai-accent" x1="31" y1="25" x2="86" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f50a3"/>
      <stop offset="1" stop-color="#9db56d"/>
    </linearGradient>

    <linearGradient id="dark-accent" x1="32" y1="24" x2="88" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#465057"/>
      <stop offset="1" stop-color="#232a2e"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#3f50a3" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Symbol -->
  <g id="logo-symbol" filter="url(#soft-shadow)">
    <!-- Outer rounded sheet -->
    <rect x="16" y="14" width="82" height="82" rx="22" fill="url(#sheet-bg)"/>

    <!-- Fold / depth layer -->
    <path d="M76 14h4c9.94 0 18 8.06 18 18v4L76 14Z" fill="#e7e6d3" opacity="0.9"/>
    <path d="M76 14v19c0 2.21 1.79 4 4 4h18" fill="none" stroke="#b9b8a3" stroke-width="2"/>

    <!-- Spreadsheet grid panel -->
    <rect x="30" y="33" width="54" height="42" rx="8" fill="#f1efe0" opacity="0.72"/>
    <path d="M30 47h54M30 61h54M48 33v42M66 33v42" stroke="#455a67" stroke-opacity="0.28" stroke-width="2"/>

    <!-- AI route / intelligence line -->
    <path d="M39 68C48 51 56 57 62 45C68 33 76 37 81 28" fill="none" stroke="url(#ai-accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="39" cy="68" r="4" fill="#3f50a3"/>
    <circle cx="62" cy="45" r="4" fill="#9db56d"/>
    <circle cx="81" cy="28" r="4" fill="#3f50a3"/>

    <!-- Spark -->
    <path d="M82 55l3.2 7.2L92 65.5l-6.8 3.1L82 76l-3.2-7.4L72 65.5l6.8-3.3L82 55Z" fill="#9db56d"/>
    <path d="M42 24l1.9 4.1L48 30l-4.1 1.9L42 36l-1.9-4.1L36 30l4.1-1.9L42 24Z" fill="#3f50a3"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <!-- 这里的 y="58" 已经全部修改为 y="69" -->
    <text x="103" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="760" letter-spacing="-1.4" fill="#343250">
      AI
    </text>
    <text x="154" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="680" letter-spacing="-1.2" fill="#455a67">
      Sheet
    </text>
  </g>
</svg>