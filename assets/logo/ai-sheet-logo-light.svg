<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 112" role="img" aria-labelledby="ai-sheet-light-logo-title ai-sheet-light-logo-desc">
  <title id="ai-sheet-light-logo-title">AI Sheet Light Logo</title>
  <desc id="ai-sheet-light-logo-desc">AI Sheet logo optimized for light WoodAsh theme backgrounds.</desc>

  <defs>
    <linearGradient id="light-symbol-bg" x1="16" y1="14" x2="98" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7e6d3"/>
      <stop offset="1" stop-color="#ceceb4"/>
    </linearGradient>

    <linearGradient id="light-symbol-accent" x1="34" y1="26" x2="88" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f50a3"/>
      <stop offset="1" stop-color="#9db56d"/>
    </linearGradient>

    <filter id="light-soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#343250" flood-opacity="0.13"/>
    </filter>
  </defs>

  <g id="light-logo-symbol" filter="url(#light-soft-shadow)">
    <rect x="16" y="14" width="82" height="82" rx="22" fill="url(#light-symbol-bg)"/>
    <path d="M76 14h4c9.94 0 18 8.06 18 18v4L76 14Z" fill="#f1efe0" opacity="0.96"/>
    <path d="M76 14v19c0 2.21 1.79 4 4 4h18" fill="none" stroke="#b9b8a3" stroke-width="2"/>

    <rect x="30" y="33" width="54" height="42" rx="8" fill="#dddbc7" opacity="0.86"/>
    <path d="M30 47h54M30 61h54M48 33v42M66 33v42" stroke="#455a67" stroke-opacity="0.28" stroke-width="2"/>

    <path d="M39 68C48 51 56 57 62 45C68 33 76 37 81 28" fill="none" stroke="url(#light-symbol-accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="39" cy="68" r="4" fill="#3f50a3"/>
    <circle cx="62" cy="45" r="4" fill="#9db56d"/>
    <circle cx="81" cy="28" r="4" fill="#3f50a3"/>

    <path d="M82 55l3.2 7.2L92 65.5l-6.8 3.1L82 76l-3.2-7.4L72 65.5l6.8-3.3L82 55Z" fill="#9db56d"/>
    <path d="M42 24l1.9 4.1L48 30l-4.1 1.9L42 36l-1.9-4.1L36 30l4.1-1.9L42 24Z" fill="#3f50a3"/>
  </g>

  <g id="light-wordmark">
    <!-- 将 y="58" 调整为了 y="69" 以实现与图标的完美垂直居中 -->
    <text x="103" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="760" letter-spacing="-1.4" fill="#343250">
      AI
    </text>
    <text x="154" y="69" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="680" letter-spacing="-1.2" fill="#455a67">
      Sheet
    </text>
  </g>
</svg>